        <button type="button" class="zl-chat-fab" id="zl-chat-fab" aria-label="联系客服">
            <i class="fa-solid fa-headset"></i>
        </button>
        <div class="zl-chat-panel" id="zl-chat-panel" aria-label="客服会话窗口">
            <div class="zl-chat-head">
                <strong>在线客服</strong>
                <button type="button" id="zl-chat-close" aria-label="关闭客服会话">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="zl-chat-body">
                <div id="zl-chat-list"></div>
            </div>
            <div class="zl-chat-actions">
                <input type="text" id="zl-chat-input" placeholder="请输入咨询内容..." />
                <input type="file" id="zl-chat-file" accept="image/*" style="display:none" />
                <button type="button" id="zl-chat-file-btn">上传</button>
                <button type="button" id="zl-chat-send">发送</button>
            </div>
        </div>
        <script>
        (function () {
          var TOKEN_KEYS = ['zhongliang_token', 'zl_token', 'token'];
          var token = TOKEN_KEYS.map(function (k) { return localStorage.getItem(k); }).find(function (v) { return v && String(v).trim(); }) || '';
          var fab = document.getElementById('zl-chat-fab');
          var panel = document.getElementById('zl-chat-panel');
          var closeBtn = document.getElementById('zl-chat-close');
          var listEl = document.getElementById('zl-chat-list');
          var inputEl = document.getElementById('zl-chat-input');
          var sendBtn = document.getElementById('zl-chat-send');
          var fileInput = document.getElementById('zl-chat-file');
          var fileBtn = document.getElementById('zl-chat-file-btn');
          if (!fab || !panel) return;
          var timer = null;
          var sessionId = '';

          function addBubble(text, role) {
            if (!listEl) return;
            var row = document.createElement('div');
            row.style.marginBottom = '0.45rem';
            row.style.display = 'flex';
            row.style.justifyContent = role === 'user' ? 'flex-end' : 'flex-start';
            row.innerHTML = '<span style="max-width:82%;display:inline-block;padding:.42rem .58rem;border-radius:10px;background:' +
              (role === 'user' ? 'rgba(45,212,191,.22)' : 'rgba(148,211,255,.2)') +
              ';color:#0f2744;font-size:.8rem;line-height:1.45;">' + text + '</span>';
            listEl.appendChild(row);
            listEl.scrollTop = listEl.scrollHeight;
          }

          async function api(url, opt) {
            var headers = (opt && opt.headers) ? opt.headers : {};
            if (token) headers.Authorization = 'Bearer ' + token;
            var payload = { method: (opt && opt.method) || 'GET', headers: headers };
            if (opt && opt.json) {
              headers['Content-Type'] = 'application/json';
              payload.body = JSON.stringify(opt.json);
            }
            var res = await fetch(url, payload);
            var data = await res.json().catch(function () { return {}; });
            if (!res.ok) throw new Error(data.message || ('请求失败(' + res.status + ')'));
            return data;
          }

          async function openSession() {
            if (!token) {
              addBubble('请先登录后再发起实时客服会话。', 'agent');
              return;
            }
            if (sessionId) return;
            var opened = await api('/api/support/session/open', { method: 'POST', json: { source: 'steris' } });
            sessionId = opened && opened.session && opened.session.id ? opened.session.id : '';
            if (sessionId) {
              addBubble('客服会话已建立，请输入你的问题。', 'agent');
              await loadMessages();
              if (timer) clearInterval(timer);
              timer = setInterval(loadMessages, 3000);
            }
          }

          async function loadMessages() {
            if (!sessionId) return;
            var data = await api('/api/support/messages?session_id=' + encodeURIComponent(sessionId));
            if (!listEl) return;
            listEl.innerHTML = '';
            (data.list || []).forEach(function (m) {
              var role = m.sender_role === 'user' ? 'user' : 'agent';
              var txt = String(m.content || '');
              addBubble(txt, role);
            });
            api('/api/support/messages/read', { method: 'POST', json: { session_id: sessionId } }).catch(function () {});
          }

          async function sendText() {
            var val = inputEl && inputEl.value ? inputEl.value.trim() : '';
            if (!val) return;
            if (!sessionId) await openSession();
            if (!sessionId) return;
            inputEl.value = '';
            await api('/api/support/messages/send', { method: 'POST', json: { session_id: sessionId, content: val } });
            await loadMessages();
          }

          async function sendImage(file) {
            if (!file) return;
            if (!sessionId) await openSession();
            if (!sessionId) return;
            var reader = new FileReader();
            reader.onload = async function () {
              try {
                var up = await api('/api/support/upload-image', { method: 'POST', json: { imageBase64: reader.result } });
                var txt = '图片凭证：' + (up.url || '');
                await api('/api/support/messages/send', { method: 'POST', json: { session_id: sessionId, content: txt } });
                await loadMessages();
              } catch (e) {
                addBubble(e.message || '上传失败', 'agent');
              }
            };
            reader.readAsDataURL(file);
          }

          function openPanel() { panel.classList.add('is-open'); }
          function closePanel() {
            panel.classList.remove('is-open');
            if (timer) { clearInterval(timer); timer = null; }
          }
          fab.addEventListener('click', function () {
            openPanel();
            openSession().catch(function (e) { addBubble(e.message || '会话开启失败', 'agent'); });
          });
          if (closeBtn) closeBtn.addEventListener('click', closePanel);
          if (sendBtn) sendBtn.addEventListener('click', function () { sendText().catch(function (e) { addBubble(e.message, 'agent'); }); });
          if (inputEl) inputEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
              e.preventDefault();
              sendText().catch(function (err) { addBubble(err.message, 'agent'); });
            }
          });
          if (fileBtn && fileInput) fileBtn.addEventListener('click', function () { fileInput.click(); });
          if (fileInput) fileInput.addEventListener('change', function () { sendImage(fileInput.files && fileInput.files[0]).catch(function (e) { addBubble(e.message, 'agent'); }); });
          document.querySelectorAll('[data-open-chat]').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
              e.preventDefault();
              openPanel();
              openSession().catch(function (err) { addBubble(err.message, 'agent'); });
            });
          });

          var dragging = false;
          var startX = 0;
          var startY = 0;
          var originRight = 0;
          var originBottom = 0;
          fab.addEventListener('pointerdown', function (e) {
            dragging = true;
            startX = e.clientX;
            startY = e.clientY;
            originRight = parseFloat(getComputedStyle(fab).right) || 0;
            originBottom = parseFloat(getComputedStyle(fab).bottom) || 0;
            fab.setPointerCapture(e.pointerId);
          });
          fab.addEventListener('pointermove', function (e) {
            if (!dragging) return;
            var dx = e.clientX - startX;
            var dy = e.clientY - startY;
            var nextRight = Math.max(8, originRight - dx);
            var nextBottom = Math.max(8, originBottom - dy);
            fab.style.right = nextRight + 'px';
            fab.style.bottom = nextBottom + 'px';
            panel.style.right = nextRight + 'px';
            panel.style.bottom = (nextBottom + 68) + 'px';
          });
          fab.addEventListener('pointerup', function () { dragging = false; });
        })();
        </script>
