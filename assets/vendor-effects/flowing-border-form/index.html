<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>动态的登陆表单样式 www.bootstrapmb.com </title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div class="box">
		<form autocomplete="off">
			<h2>登陆</h2>
			<div class="inputBox">
				<input type="text" required="required">
				<span>用户名</span>
				<i></i>
			</div>
			<div class="inputBox">
				<input type="password" required="required">
				<span>密码</span>
				<i></i>
			</div>
			<div class="links">
				<a href="#">忘记密码 ?</a>
				<a href="#">注册</a>
			</div>
			<input type="submit" value="确认">
		</form>
	</div>
</body>

</html>
